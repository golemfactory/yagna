[package]
name = "ya-test-framework"
version = "0.1.0"
edition = "2021"


[dependencies]
actix-rt = "2.7"
anyhow = "1"
assert_cmd = "=2.0.17"
log = "0.4"
serde = "1.0"
serde_json = "1.0"
serial_test = { git = "https://github.com/golemfactory/serial_test.git", branch = "actix_rt_test", features = [
    "actix-rt2",
] }
tokio = { version = "1", features = ["rt", "rt-multi-thread"] }
url = "2.3"
portpicker = "0.1"

ya-utils-process.workspace = true
ya-framework-macro = { path = "./framework-macro" }
arkiv-test-utils.workspace = true

[target.'cfg(target_family = "unix")'.dependencies]
libc = "0.2.73"
nix = "0.22.0"
